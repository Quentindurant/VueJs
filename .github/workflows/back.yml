name: 🚀 Deploy Back (Express)

on:
  push:
    branches: [main]
    paths: ['Backend/**']
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Back
    runs-on: ubuntu-latest

    steps:
      - name: "📦 Checkout"
        uses: actions/checkout@v4

      - name: "🚀 Deploy on VPS via SSH"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          port:     ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/var/www/html/api.quentindurant.com"

            echo "──────────────────────────────────────────"
            echo "  📥  Pull des dernières modifications"
            echo "──────────────────────────────────────────"
            cd "$APP_DIR"
            git fetch origin main
            git clean -fd
            git pull origin main

            echo "──────────────────────────────────────────"
            echo "  📦  Installation des dépendances"
            echo "──────────────────────────────────────────"
            cd Backend
            npm install --production

            echo "──────────────────────────────────────────"
            echo "  ♻️   Redémarrage via PM2"
            echo "──────────────────────────────────────────"
            npx pm2 reload ecosystem.config.js --env production || npx pm2 start ecosystem.config.js --env production
            npx pm2 save

            echo "  ✅  Déploiement Back terminé !"
