name: 🚀 CI/CD — Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────
      - name: "📦 [1/3] Checkout"
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────
      - name: "🔍 [2/3] Lint & Type check (optionnel)"
        run: |
          echo "Ajouter ici vos commandes de test/lint si besoin"
          # npm ci && npm run lint && npm run type-check

      # ─────────────────────────────────────────────────────
      - name: "🚀 [3/3] Deploy on VPS via SSH"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          port:     ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            APP_NAME="vuejs"
            APP_DIR="/var/www/html/vuejs.quentindurant.com"
            PORT=8080

            echo "──────────────────────────────────────────"
            echo "  📥  Pull des dernières modifications"
            echo "──────────────────────────────────────────"
            cd "$APP_DIR"
            git pull origin main

            echo "──────────────────────────────────────────"
            echo "  🐳  Rebuild de l'image Docker"
            echo "──────────────────────────────────────────"
            sudo docker build -t "${APP_NAME}:latest" .

            echo "──────────────────────────────────────────"
            echo "  ♻️   Redémarrage via Docker"
            echo "──────────────────────────────────────────"
            sudo docker stop "$APP_NAME" || true
            sudo docker rm "$APP_NAME" || true
            sudo docker run -d --restart unless-stopped --name "$APP_NAME" -p ${PORT}:80 "${APP_NAME}:latest"

            echo "──────────────────────────────────────────"
            echo "  🔁  Health check"
            echo "──────────────────────────────────────────"
            sleep 5
            HTTP=$(curl -sk -o /dev/null -w "%{http_code}" "http://127.0.0.1:${PORT}" || echo "000")
            if [[ "$HTTP" =~ ^(200|301|302|304)$ ]]; then
              echo "  ✅  Health check OK — HTTP $HTTP"
            else
              echo "  ⚠️   Health check a échoué (Code: $HTTP)"
              echo "  📜  Logs du conteneur:"
              sudo docker logs "$APP_NAME"
              exit 1
            fi

            echo ""
            echo "  ✅  Déploiement terminé !"
            echo "  📊  $(sudo docker ps -f name=$APP_NAME)"
